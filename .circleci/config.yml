version: 2.1

jobs:
  verify:
    docker:
      - image: cimg/node:lts
    # Placeholder values so the build can boot without production secrets.
    # These only need to be well-formed, not real — no data is reached at build time.
    environment:
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsYWNlaG9sZGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE2MDk0NTkyMDAsImV4cCI6MjAwMDAwMDAwMH0.placeholder_signature"
      CLOUDINARY_CLOUD_NAME: "placeholder"
      CLOUDINARY_API_KEY: "placeholder"
      CLOUDINARY_API_SECRET: "placeholder"
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "package-lock.json" }}
            - deps-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: TypeScript type check
          command: npm run typecheck
      - run:
          name: Lint
          command: npm run lint
      - run:
          name: Production build
          command: npm run build

workflows:
  ci:
    jobs:
      - verify
